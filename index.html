<!-- CHAT -->
<div id="chatPage" class="chat-page" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <!-- TOP BAR MOBILE CLOSE -->
        <div class="mobile-topbar">
            <span>Chats</span>
            <button id="closeSidebar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- USER CARD -->
        <div class="profile-card">

            <div class="profile-left">

                <img id="myPhoto"
                     src="https://ui-avatars.com/api/?name=DDT"
                     class="profile-avatar">

                <div>
                    <div id="myName" class="profile-name">Loading...</div>

                    <div class="online-status">
                        <span class="dot"></span>
                        Online
                    </div>
                </div>

            </div>

            <div class="profile-actions">
                <button class="icon-btn">
                    <i class="fa-solid fa-gear"></i>
                </button>

                <button id="logoutBtn" class="icon-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>

        </div>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Cari user atau grup...">
        </div>

        <button class="groups-btn">Groups</button>
        <button class="create-group-btn">Buat Grup Baru</button>

        <div id="userList" class="group-list"></div>

    </aside>


    <!-- CHAT AREA -->
    <main class="chat">

        <!-- HEADER (mobile toggle sidebar) -->
        <div class="chat-header">

            <button id="openSidebar" class="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="chat-header-left">

                <img src="https://ui-avatars.com/api/?name=DDT"
                     class="chat-group-avatar">

                <div>
                    <div id="roomName" class="group-title">Room Chat</div>
                    <div id="roomMembers" class="group-members">0 anggota</div>
                </div>

            </div>

        </div>


        <!-- MESSAGES -->
        <div id="messages" class="messages"></div>


        <!-- INPUT -->
        <div class="input-box">

            <input type="text"
                   id="messageInput"
                   placeholder="Ketik pesan...">

            <button id="sendBtn" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>

        </div>

    </main>

</div>
