<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat DDT</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginPage">

        <h1>CHAT DDT</h1>

        <button id="loginBtn">
            Login Google
        </button>

    </div>

    <div id="chatPage" style="display:none;">

        <div class="sidebar">
            <h3>Grup</h3>

            <ul>
                <li>BUKTI QRIS</li>
                <li>TURNOVER DDT</li>
                <li>BUKTI DEPOSIT</li>
            </ul>
        </div>

        <div class="chat">

            <div class="header">
                Room Chat
            </div>

            <div id="messages"></div>

            <div class="input-box">

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Tulis pesan..."
                >

                <button id="sendBtn">
                    Kirim
                </button>

            </div>

        </div>

    </div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
