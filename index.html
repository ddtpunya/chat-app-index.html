<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT DDT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
</head>
<body>

<div id="loginPage">
    <div class="login-card">
        <h1>CHAT DDT</h1>
        <p>Realtime Group Chat</p>
        <button id="loginBtn">
            <i class="fa-brands fa-google"></i>
            Login Google
        </button>
    </div>
</div>

<div id="chatPage" style="display:none;">

    <aside class="sidebar">

        <div class="profile-card">
            <div class="profile-left">
                <img id="myPhoto" src="https://ui-avatars.com/api/?name=DDT" class="profile-avatar" alt="My Profile">
                <div>
                    <div id="myName" class="profile-name">Loading...</div>
                    <div class="online-status">
                        <span class="dot"></span>
                        <span class="dot dot-soft"></span>
                        Online
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <button class="icon-btn" title="Setting">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button id="logoutBtn" class="icon-btn" title="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <div class="sidebar-search-wrap">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Cari user atau grup...">
            </div>
        </div>

        <button class="groups-btn">
            <i class="fa-regular fa-message"></i>
            Groups
        </button>

        <button class="create-group-btn">
            <i class="fa-solid fa-plus"></i>
            Buat Grup Baru
        </button>

        <div id="userList" class="group-list"></div>

    </aside>

    <div class="sidebar-divider">
        <button class="collapse-handle" title="Collapse sidebar">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
    </div>

    <main class="chat">

        <div class="chat-header">
            <div class="chat-header-left">
                <button id="backToSidebarBtn" class="icon-btn back-btn" style="display: none;">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <img src="https://ui-avatars.com/api/?name=DDT" class="chat-group-avatar" alt="Group Avatar">
                <div>
                    <div class="group-title" id="roomName">Room Chat</div>
                    <div class="group-members" id="roomMembers">0 anggota</div>
                </div>
            </div>

            <div class="chat-header-right">
                <div class="message-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Cari pesan di chat ini...">
                </div>

                <button class="icon-btn" title="Cari">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="icon-btn" title="Setting">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </div>

        <div id="messages"></div>

        <button id="scrollBottomBtn" class="scroll-bottom-btn">
            <i class="fa-solid fa-chevron-down"></i>
            Ke Bawah
        </button>

        <div class="input-box">
            <button class="bottom-btn">😊</button>

            <input type="text" id="messageInput" placeholder="Ketik pesan... (Ctrl+V untuk paste media)">

            <button class="bottom-btn" title="Gambar">
                <i class="fa-regular fa-image"></i>
            </button>
            <button class="bottom-btn" title="Upload">
                <i class="fa-solid fa-arrow-up-from-bracket"></i>
            </button>
            <button id="sendBtn" class="send-btn" title="Kirim">
                <i class="fa-regular fa-paper-plane"></i>
            </button>
        </div>

    </main>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
