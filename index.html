<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>CHAT DDT</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
    (() => {
        const APP_PATH = "/chat-app-index.html/";

        // Remove only service workers belonging to this GitHub Pages project.
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", async () => {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(
                        registrations
                            .filter(registration => {
                                try {
                                    return new URL(registration.scope).pathname.startsWith(APP_PATH);
                                } catch {
                                    return false;
                                }
                            })
                            .map(registration => registration.unregister())
                    );
                } catch (error) {
                    console.warn("Service worker cleanup gagal:", error);
                }
            });
        }
    })();
    </script>

    <link rel="stylesheet" href="style.css?v=20260711-redirect-fix-1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div id="loginPage">
    <div class="login-card">
        <h1>CHAT DDT</h1>
        <p>Realtime Group Chat</p>
        <button id="loginBtn">
            <i class="fa-brands fa-google"></i>
            Login Google
        </button>
    </div>
</div>

<div id="chatPage" style="display:none;">

    <aside class="sidebar">
        <div class="profile-card">
            <div class="profile-left">
                <img id="myPhoto" src="https://ui-avatars.com/api/?name=DDT" class="profile-avatar" alt="My Profile">
                <div>
                    <div id="myName" class="profile-name">Loading...</div>
                    <div class="online-status">
                        <span class="dot"></span>
                        <span class="dot dot-soft"></span>
                        Online
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <button class="icon-btn" title="Setting" type="button">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button id="logoutBtn" class="icon-btn" title="Logout" type="button">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <div class="sidebar-search-wrap">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Cari user atau grup...">
            </div>
        </div>

        <button class="groups-btn" type="button">
            <i class="fa-regular fa-message"></i>
            Groups
        </button>

        <button class="create-group-btn" type="button">
            <i class="fa-solid fa-plus"></i>
            Buat Grup Baru
        </button>

        <div id="userList" class="group-list"></div>
    </aside>

    <div class="sidebar-divider">
        <button class="collapse-handle" title="Collapse sidebar" type="button">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
    </div>

    <main class="chat">
        <div class="chat-header">
            <div class="chat-header-left">
                <button id="backToSidebarBtn" class="icon-btn back-btn" style="display:none;" type="button">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <img src="https://ui-avatars.com/api/?name=DDT" class="chat-group-avatar" alt="Group Avatar">
                <div>
                    <div class="group-title" id="roomName">Room Chat</div>
                    <div class="group-members" id="roomMembers">0 anggota</div>
                </div>
            </div>

            <div class="chat-header-right">
                <div class="message-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Cari pesan di chat ini...">
                </div>

                <button class="icon-btn" title="Cari" type="button">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="icon-btn" title="Setting" type="button">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </div>

        <div id="messages"></div>

        <button id="scrollBottomBtn" class="scroll-bottom-btn" type="button">
            <i class="fa-solid fa-chevron-down"></i>
            Ke Bawah
        </button>

        <div id="emojiPicker" class="emoji-picker" hidden aria-label="Pilih emotikon"></div>

        <div class="composer-wrap">
            <div id="replyPreview" class="reply-preview" hidden>
                <div class="reply-preview-line"></div>
                <div class="reply-preview-content">
                    <div class="reply-preview-label">
                        Membalas <strong id="replyPreviewName">User</strong>
                    </div>
                    <div id="replyPreviewText" class="reply-preview-text"></div>
                </div>
                <button id="cancelReplyBtn" class="cancel-reply-btn" type="button" title="Batalkan balasan">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="uploadStatus" class="upload-status" hidden>
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span id="uploadStatusText">Mengupload...</span>
                <div class="upload-progress-track">
                    <div id="uploadProgressBar" class="upload-progress-bar"></div>
                </div>
            </div>

            <div class="input-box">
                <button id="emojiBtn" class="bottom-btn" title="Emotikon" type="button">😊</button>

                <input type="text" id="messageInput" placeholder="Ketik pesan... (Ctrl+V untuk paste gambar)" autocomplete="off">

                <button id="imageBtn" class="bottom-btn" title="Upload gambar" type="button">
                    <i class="fa-regular fa-image"></i>
                </button>
                <button id="fileBtn" class="bottom-btn" title="Upload file" type="button">
                    <i class="fa-solid fa-arrow-up-from-bracket"></i>
                </button>
                <button id="sendBtn" class="send-btn" title="Kirim" type="button">
                    <i class="fa-regular fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <input id="imageInput" type="file" accept="image/*" hidden>
        <input id="fileInput" type="file" hidden>
    </main>
</div>

<script type="module" src="firebase.js?v=20260711-redirect-fix-1"></script>
<script type="module" src="auth.js?v=20260711-redirect-fix-1"></script>
<script type="module" src="app.js?v=20260711-redirect-fix-1"></script>

</body>
</html>
